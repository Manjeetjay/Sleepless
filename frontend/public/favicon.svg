<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>

    <linearGradient id="server" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Uptime Ring -->
  <circle
    cx="256"
    cy="256"
    r="180"
    fill="none"
    stroke="url(#ring)"
    stroke-width="16"
    stroke-linecap="round"/>

  <!-- Moon -->
  <path
    d="M175 145
       A70 70 0 1 0 245 245
       A55 55 0 1 1 175 145Z"
    fill="#E2E8F0"/>

  <!-- Server Stack -->
  <g transform="translate(0,20)">
    <rect x="180" y="220" width="152" height="42" rx="10"
          fill="url(#server)" stroke="#334155"/>

    <rect x="180" y="268" width="152" height="42" rx="10"
          fill="url(#server)" stroke="#334155"/>

    <rect x="180" y="316" width="152" height="42" rx="10"
          fill="url(#server)" stroke="#334155"/>

    <!-- LEDs -->
    <circle cx="300" cy="241" r="5" fill="#38BDF8" filter="url(#glow)"/>
    <circle cx="316" cy="241" r="5" fill="#38BDF8" filter="url(#glow)"/>

    <circle cx="300" cy="289" r="5" fill="#38BDF8" filter="url(#glow)"/>
    <circle cx="316" cy="289" r="5" fill="#38BDF8" filter="url(#glow)"/>

    <circle cx="300" cy="337" r="5" fill="#38BDF8" filter="url(#glow)"/>
    <circle cx="316" cy="337" r="5" fill="#38BDF8" filter="url(#glow)"/>
  </g>

  <!-- Stars -->
  <circle cx="330" cy="140" r="4" fill="#FFFFFF"/>
  <circle cx="360" cy="175" r="3" fill="#FFFFFF"/>
  <circle cx="150" cy="190" r="3" fill="#FFFFFF"/>
</svg>