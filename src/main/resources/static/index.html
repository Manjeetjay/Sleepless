<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleepless</title>
    <meta name="description" content="Minimal UI for managing Sleepless monitors.">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="brand">
                <h1>Sleepless</h1>
                <p>Keep your services awake.</p>
            </div>

            <div class="topbar-actions">
                <div class="health-inline" aria-live="polite">
                    <span class="status-dot" id="health-dot"></span>
                    <span id="health-state">Checking health...</span>
                </div>
                <button class="button button-secondary" type="button" id="ping-all">
                    Ping all
                </button>
                <button class="button button-secondary" type="button" id="refresh-dashboard">
                    Refresh
                </button>
            </div>
        </header>

        <section class="summary" aria-label="Summary">
            <span id="summary-total">0 monitors</span>
            <span id="summary-success">0 successful pings</span>
            <span id="summary-failure">0 failures</span>
        </section>

        <main class="layout">
            <section class="panel">
                <div class="section-header">
                    <h2 id="form-title">Create monitor</h2>
                    <button class="button button-secondary" id="cancel-edit" type="button" hidden>
                        Cancel edit
                    </button>
                </div>

                <form id="monitor-form" class="monitor-form">
                    <label class="field">
                        <span>Endpoint URL</span>
                        <input
                            id="url"
                            name="url"
                            type="url"
                            placeholder="https://api.example.com/health"
                            required
                        >
                    </label>

                    <div class="field-row">
                        <label class="field">
                            <span>HTTP method</span>
                            <select id="method" name="method">
                                <option value="GET">GET</option>
                                <option value="POST">POST</option>
                            </select>
                        </label>

                        <label class="field">
                            <span>Cron expression</span>
                            <input
                                id="cronExpression"
                                name="cronExpression"
                                type="text"
                                placeholder="0 */15 * * * *"
                                required
                            >
                        </label>
                    </div>

                    <label class="field">
                        <span>Request body JSON</span>
                        <textarea
                            id="requestBody"
                            name="requestBody"
                            rows="6"
                            placeholder='{"ping":"keep-alive"}'
                        ></textarea>
                    </label>

                    <label class="field">
                        <span>Expected response JSON</span>
                        <textarea
                            id="expectedStructure"
                            name="expectedStructure"
                            rows="6"
                            placeholder='{"status":"ok"}'
                        ></textarea>
                    </label>

                    <p class="field-note">Leave the JSON fields empty if you do not need them.</p>

                    <div class="form-actions">
                        <button class="button button-primary" id="submit-button" type="submit">
                            Save monitor
                        </button>
                    </div>
                </form>
            </section>

            <section class="panel">
                <div class="section-header section-header-list">
                    <h2>Monitors</h2>
                    <span class="section-meta" id="monitor-count-label">0 monitors</span>
                </div>

                <div class="message hidden" id="message-box" role="status" aria-live="polite"></div>

                <div class="monitor-list" id="monitor-list">
                    <div class="empty-state">
                        <p>No monitors yet.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <template id="monitor-template">
        <article class="monitor-item">
            <div class="monitor-main">
                <div class="monitor-info">
                    <div class="monitor-url"></div>
                    <div class="monitor-meta">
                        <span class="method-badge"></span>
                        <span class="monitor-cron"></span>
                        <span class="monitor-updated"></span>
                    </div>
                </div>
                <span class="status-badge"></span>
            </div>

            <div class="monitor-stats">
                <span class="monitor-success"></span>
                <span class="monitor-failure"></span>
                <span class="monitor-validation"></span>
            </div>

            <pre class="json-preview hidden"></pre>

            <div class="monitor-actions">
                <button type="button" class="button button-secondary preview-button">JSON</button>
                <button type="button" class="button button-secondary edit-button">Edit</button>
                <button type="button" class="button button-danger delete-button">Delete</button>
            </div>
        </article>
    </template>

    <script src="app.js" defer></script>
</body>
</html>
